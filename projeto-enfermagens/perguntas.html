<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilos/pergutas.css">
    <title>Document</title>
</head>

<body>
    <div class="quiz-container">
        <header>
            <h1 id="titulo">Quiz de Enfermagem</h1>
            <p id="welcome-message">Olá, estudante!</p>
        </header>

        <main>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>

            <section class="question-box">
                <p class="question-number" id="question-number">Pergunta 1 de 5</p>
                <h2 class="question-text" id="question-text">Pergunta será carregada aqui.</h2>
                <div class="answers" id="answers"></div>
            </section>

            <div class="controls">
                <button id="submit-btn" type="button" class="submit-button">Enviar resposta</button>
            </div>
            <div class="result-box hidden" id="result-box">
                <h2>Resultado</h2>
                <p id="score-text"></p>
                <p id="evaluation-text"></p>
                <button id="retry-btn" type="button">Refazer</button>
            </div>
        </main>

        <footer>
            <a href="index.html" class="back-link">Voltar para o início</a>
        </footer>
    </div>

    <script src="script.js"></script>
</body>

</html>
